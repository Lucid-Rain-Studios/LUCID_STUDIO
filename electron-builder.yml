appId: com.lucidrainstudios.lucidstudio
productName: LUCID STUDIO
copyright: Copyright © 2026 Lucid Rain Studios

directories:
  output: Build
  buildResources: assets

files:
  - "dist-electron/**/*"
  - "dist-renderer/**/*"
  - "package.json"

extraResources:
  - from: assets/icon.png
    to: assets/icon.png
  - from: assets/icon.ico
    to: assets/icon.ico

# Native modules + bundled Git must live outside the ASAR archive
asarUnpack:
  - "node_modules/dugite/**/*"
  - "node_modules/keytar/**/*"
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/sharp/**/*"

# Versioned filenames make GitHub Releases clean
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

compression: maximum

# ── Windows ──────────────────────────────────────────────────────────────────
win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch: [x64]
  requestedExecutionLevel: asInvoker   # install to AppData, no UAC prompt
  # Keep executable editing disabled on Windows hosts without symlink privileges;
  # the NSIS script below sets LUCID STUDIO's desktop shortcut icon explicitly.
  signAndEditExecutable: false

nsis:
  include: assets/installer.nsh
  oneClick: true
  perMachine: false
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: LUCID STUDIO
  # Windows code-signing — configure secrets in GitHub when ready:
  # signingHashAlgorithms: [sha256]
  # certificateFile: ${CSC_LINK}
  # certificatePassword: ${CSC_KEY_PASSWORD}

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch: [x64, arm64]          # Intel + Apple Silicon
  icon: assets/icon.icns
  hardenedRuntime: true            # required for notarization
  gatekeeperAssess: false
  category: public.app-category.productivity
  # macOS notarization — configure secrets in GitHub when ready:
  # afterSign: scripts/notarize.js
  entitlementsInherit: assets/entitlements.mac.plist

dmg:
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Linux ─────────────────────────────────────────────────────────────────────
linux:
  target: AppImage
  icon: assets/icon.png
  category: Productivity
  synopsis: Local-first creative and work studio
  description: LUCID STUDIO is a local-first desktop workspace for dashboards, notes, tasks, time tracking, files, and creative tools.

# ── Auto-update via GitHub Releases ──────────────────────────────────────────
publish:
  provider: github
  owner: Lucid-Rain-Studios
  repo: LUCID_STUDIO
  releaseType: release
  publishAutoUpdate: true
